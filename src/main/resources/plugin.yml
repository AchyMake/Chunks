name: Chunks
version: '${project.version}'
main: org.achymake.chunks.Chunks
api-version: '1.20'
load: POSTWORLD
prefix: '${project.name}'
author: AchyMake
description: '${project.description}'
depend:
  - Vault
  - WorldGuard
  - PlaceholderAPI
softdepend:
  - Recovery
commands:
  chunk:
    usage: /chunk help
    description: chunk commands
    permission-message: You are do not have the permission to execute the command
    permission: chunks.command.chunk
  chunks:
    usage: /chunks help
    description: chunks commands
    permission-message: You are do not have the permission to execute the command
    permission: chunks.command.chunks
permissions:
  chunks.command.chunk:
    description: chunk command
    default: op
  chunks.command.chunk.ban:
    description: bans player from claimed
    default: op
  chunks.command.chunk.banned:
    description: list of banned players from claimed
    default: op
  chunks.command.chunk.claim:
    description: claims chunk
    default: op
  chunks.command.chunk.help:
    description: list of commands
    default: op
  chunks.command.chunk.members:
    description: list of members
    default: op
  chunks.command.chunk.tnt:
    description: allows tnt on standing chunk
    default: op
  chunks.command.chunk.unban:
    description: unbans from claimed chunks
    default: op
  chunks.command.chunk.unclaim:
    description: unclaim command
    default: op
  chunks.command.chunks:
    description: allows to use chunks command
    default: op
  chunks.command.chunks.delete:
    description: unclaims claimed or protected chunks
    default: op
  chunks.command.chunks.edit:
    description: allows to edit protected and claimed
    default: op
  chunks.command.chunks.effect:
    description: showcase claim or unclaim effects
    default: op
  chunks.command.chunks.help:
    description: list of commands
    default: op
  chunks.command.chunks.info:
    description: info of the standing chunk
    default: op
  chunks.command.chunks.reload:
    description: reload plugin files
    default: op
  chunks.command.chunks.setowner:
    description: allows to setowner
    default: op
